name: water_refilling_app
description: Water Refilling Business Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  
  # QR Code Scanner
  qr_code_scanner: ^1.0.1
  mobile_scanner: ^3.5.2
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.3
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^12.1.1
  
  # Date & Time
  intl: ^0.18.1
  
  # Loading & Dialogs
  flutter_spinkit: ^5.2.0
  
  # Pull to Refresh
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
