<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Water Refilling System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-droplet-fill me-2"></i>
                Water Refilling System
            </a>
            <div class="dropdown">
                <button class="btn btn-link text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span id="userName">Admin</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="bi bi-speedometer2"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="transactions.html">
                                <i class="bi bi-receipt"></i>Transactions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="gallons.html">
                                <i class="bi bi-droplet"></i>Gallons
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="reports.html">
                                <i class="bi bi-file-earmark-text"></i>Reports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="qr-print.html">
                                <i class="bi bi-qr-code"></i>Print QR Codes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="settings.html">
                                <i class="bi bi-gear"></i>Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Reports</h1>
                </div>

                <!-- Report Selection -->
                <div class="row mb-4">
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-calendar-day me-2"></i>Daily Report</h5>
                                <p class="card-text">View sales summary for a specific day</p>
                                <input type="date" class="form-control mb-2" id="dailyDate" value="">
                                <button class="btn btn-primary w-100" onclick="generateDailyReport()">
                                    Generate Report
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-calendar-week me-2"></i>Weekly Report</h5>
                                <p class="card-text">View current week's sales summary</p>
                                <button class="btn btn-primary w-100" onclick="generateWeeklyReport()">
                                    Generate Report
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-calendar-month me-2"></i>Monthly Report</h5>
                                <p class="card-text">View monthly sales summary</p>
                                <div class="row g-2 mb-2">
                                    <div class="col-6">
                                        <select class="form-select" id="monthSelect">
                                            <option value="1">January</option>
                                            <option value="2">February</option>
                                            <option value="3">March</option>
                                            <option value="4">April</option>
                                            <option value="5">May</option>
                                            <option value="6">June</option>
                                            <option value="7">July</option>
                                            <option value="8">August</option>
                                            <option value="9">September</option>
                                            <option value="10">October</option>
                                            <option value="11">November</option>
                                            <option value="12">December</option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <select class="form-select" id="yearSelect">
                                            <option value="2026">2026</option>
                                            <option value="2025">2025</option>
                                            <option value="2024">2024</option>
                                        </select>
                                    </div>
                                </div>
                                <button class="btn btn-primary w-100" onclick="generateMonthlyReport()">
                                    Generate Report
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Report Display -->
                <div class="card" id="reportCard" style="display: none;">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" id="reportTitle">Report</h5>
                        <button class="btn btn-sm btn-success" onclick="printReport()">
                            <i class="bi bi-printer me-1"></i>Print
                        </button>
                    </div>
                    <div class="card-body" id="reportContent">
                        <!-- Report content will be inserted here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        if (!checkAuth()) {
            window.location.href = 'index.html';
        }

        displayUserInfo();

        // Set default date to today
        document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];
        
        // Set default month and year
        const now = new Date();
        document.getElementById('monthSelect').value = now.getMonth() + 1;
        document.getElementById('yearSelect').value = now.getFullYear();

        async function generateDailyReport() {
            const date = document.getElementById('dailyDate').value;
            if (!date) {
                showToast('Please select a date', 'warning');
                return;
            }

            try {
                const response = await apiCall(`/dashboard/daily-report?date=${date}`);
                const data = await response.json();

                displayReport('Daily Report - ' + formatDate(date), data, 'daily');
            } catch (error) {
                console.error('Error generating report:', error);
                showToast('Failed to generate report', 'danger');
            }
        }

        async function generateWeeklyReport() {
            try {
                const response = await apiCall('/dashboard/weekly-report');
                const data = await response.json();

                displayReport('Weekly Report - ' + formatDate(data.start_date) + ' to ' + formatDate(data.end_date), data, 'weekly');
            } catch (error) {
                console.error('Error generating report:', error);
                showToast('Failed to generate report', 'danger');
            }
        }

        async function generateMonthlyReport() {
            const month = document.getElementById('monthSelect').value;
            const year = document.getElementById('yearSelect').value;

            try {
                const response = await apiCall(`/dashboard/monthly-report?month=${month}&year=${year}`);
                const data = await response.json();

                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
                
                displayReport(`Monthly Report - ${monthNames[month - 1]} ${year}`, data, 'monthly');
            } catch (error) {
                console.error('Error generating report:', error);
                showToast('Failed to generate report', 'danger');
            }
        }

        function displayReport(title, data, type) {
            document.getElementById('reportTitle').textContent = title;
            
            const content = `
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card bg-primary text-white">
                            <div class="card-body text-center">
                                <h6>Total Transactions</h6>
                                <h3>${data.total_transactions}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white">
                            <div class="card-body text-center">
                                <h6>Total Revenue</h6>
                                <h3>${formatCurrency(data.total_revenue)}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white">
                            <div class="card-body text-center">
                                <h6>Total Gallons</h6>
                                <h3>${data.total_gallons}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-white">
                            <div class="card-body text-center">
                                <h6>Avg Daily Revenue</h6>
                                <h3>${formatCurrency(data.average_daily_revenue || (data.total_revenue))}</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="mb-3">Breakdown by Transaction Type</h5>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Transactions</th>
                            <th>Revenue</th>
                            <th>Percentage</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Walk-in</td>
                            <td>${data.by_type.walk_in.count}</td>
                            <td>${formatCurrency(data.by_type.walk_in.revenue)}</td>
                            <td>${((data.by_type.walk_in.revenue / data.total_revenue) * 100).toFixed(1)}%</td>
                        </tr>
                        <tr>
                            <td>Delivery</td>
                            <td>${data.by_type.delivery.count}</td>
                            <td>${formatCurrency(data.by_type.delivery.revenue)}</td>
                            <td>${((data.by_type.delivery.revenue / data.total_revenue) * 100).toFixed(1)}%</td>
                        </tr>
                        <tr>
                            <td>Refill Only</td>
                            <td>${data.by_type.refill_only.count}</td>
                            <td>${formatCurrency(data.by_type.refill_only.revenue)}</td>
                            <td>${((data.by_type.refill_only.revenue / data.total_revenue) * 100).toFixed(1)}%</td>
                        </tr>
                        <tr class="table-primary">
                            <th>Total</th>
                            <th>${data.total_transactions}</th>
                            <th>${formatCurrency(data.total_revenue)}</th>
                            <th>100%</th>
                        </tr>
                    </tbody>
                </table>
            `;

            document.getElementById('reportContent').innerHTML = content;
            document.getElementById('reportCard').style.display = 'block';
            
            showToast('Report generated successfully', 'success');
        }

        function printReport() {
            window.print();
        }
    </script>

    <style>
        @media print {
            .navbar, .sidebar, .btn, .no-print {
                display: none !important;
            }
            .col-md-10 {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</body>
</html>
