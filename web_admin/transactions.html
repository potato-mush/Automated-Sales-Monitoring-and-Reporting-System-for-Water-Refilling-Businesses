<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Water Refilling System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-droplet-fill me-2"></i>
                Water Refilling System
            </a>
            <div class="dropdown">
                <button class="btn btn-link text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span id="userName">Admin</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="bi bi-speedometer2"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="transactions.html">
                                <i class="bi bi-receipt"></i>Transactions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="gallons.html">
                                <i class="bi bi-droplet"></i>Gallons
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reports.html">
                                <i class="bi bi-file-earmark-text"></i>Reports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="qr-print.html">
                                <i class="bi bi-qr-code"></i>Print QR Codes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="settings.html">
                                <i class="bi bi-gear"></i>Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Transactions</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadTransactions()">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Transaction Type</label>
                                <select class="form-select" id="filterType" onchange="loadTransactions()">
                                    <option value="">All Types</option>
                                    <option value="walk-in">Walk-in</option>
                                    <option value="delivery">Delivery</option>
                                    <option value="refill-only">Refill Only</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control" id="filterDate" onchange="loadTransactions()">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">&nbsp;</label>
                                <button class="btn btn-secondary w-100" onclick="clearFilters()">
                                    <i class="bi bi-x-circle"></i> Clear Filters
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Transactions Table -->
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Transaction Code</th>
                                        <th>Customer</th>
                                        <th>Type</th>
                                        <th>Payment</th>
                                        <th>Quantity</th>
                                        <th>Total Amount</th>
                                        <th>Employee</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsTable">
                                    <tr>
                                        <td colspan="9" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav class="mt-3">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </main>
        </div>
    </div>

    <!-- Transaction Details Modal -->
    <div class="modal fade" id="transactionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Transaction Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="transactionDetails">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        if (!checkAuth()) {
            window.location.href = 'index.html';
        }

        displayUserInfo();

        let currentPage = 1;

        async function loadTransactions(page = 1) {
            const type = document.getElementById('filterType').value;
            const date = document.getElementById('filterDate').value;

            let url = `/transactions?page=${page}`;
            if (type) url += `&type=${type}`;
            if (date) url += `&date=${date}`;

            try {
                const response = await apiCall(url);
                const data = await response.json();

                updateTransactionsTable(data.data);
                updatePagination(data);
                currentPage = page;
            } catch (error) {
                console.error('Error loading transactions:', error);
                showToast('Failed to load transactions', 'danger');
            }
        }

        function updateTransactionsTable(transactions) {
            const tbody = document.getElementById('transactionsTable');
            
            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">No transactions found</td></tr>';
                return;
            }

            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td><strong>${t.transaction_code}</strong></td>
                    <td>${t.customer_name}</td>
                    <td><span class="badge bg-primary">${t.transaction_type}</span></td>
                    <td><span class="badge bg-secondary">${t.payment_method}</span></td>
                    <td>${t.quantity}</td>
                    <td><strong>${formatCurrency(t.total_amount)}</strong></td>
                    <td>${t.employee.name}</td>
                    <td>${formatDateTime(t.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewTransaction(${t.id})">
                            <i class="bi bi-eye"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function updatePagination(data) {
            const pagination = document.getElementById('pagination');
            const totalPages = data.last_page;
            const currentPage = data.current_page;

            let html = '';

            if (currentPage > 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadTransactions(${currentPage - 1})">Previous</a></li>`;
            }

            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadTransactions(${i})">${i}</a>
                </li>`;
            }

            if (currentPage < totalPages) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadTransactions(${currentPage + 1})">Next</a></li>`;
            }

            pagination.innerHTML = html;
        }

        async function viewTransaction(id) {
            try {
                const response = await apiCall(`/transactions/${id}`);
                const transaction = await response.json();

                const detailsHtml = `
                    <div class="row">
                        <div class="col-md-6">
                            <h6>Transaction Information</h6>
                            <table class="table table-sm">
                                <tr><th>Code:</th><td>${transaction.transaction_code}</td></tr>
                                <tr><th>Type:</th><td>${transaction.transaction_type}</td></tr>
                                <tr><th>Payment:</th><td>${transaction.payment_method}</td></tr>
                                <tr><th>Employee:</th><td>${transaction.employee.name}</td></tr>
                                <tr><th>Date:</th><td>${formatDateTime(transaction.created_at)}</td></tr>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <h6>Customer Information</h6>
                            <table class="table table-sm">
                                <tr><th>Name:</th><td>${transaction.customer_name}</td></tr>
                                <tr><th>Phone:</th><td>${transaction.customer_phone || 'N/A'}</td></tr>
                                <tr><th>Address:</th><td>${transaction.customer_address || 'N/A'}</td></tr>
                            </table>
                        </div>
                    </div>
                    <h6 class="mt-3">Gallons (${transaction.items.length})</h6>
                    <table class="table table-sm">
                        <thead>
                            <tr><th>Gallon Code</th><th>Action</th></tr>
                        </thead>
                        <tbody>
                            ${transaction.items.map(item => `
                                <tr>
                                    <td>${item.gallon.gallon_code}</td>
                                    <td><span class="badge bg-info">${item.action}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="mt-3 p-3 bg-light rounded">
                        <div class="row">
                            <div class="col-6"><strong>Quantity:</strong></div>
                            <div class="col-6 text-end">${transaction.quantity}</div>
                        </div>
                        <div class="row">
                            <div class="col-6"><strong>Unit Price:</strong></div>
                            <div class="col-6 text-end">${formatCurrency(transaction.unit_price)}</div>
                        </div>
                        <hr>
                        <div class="row">
                            <div class="col-6"><h5>Total Amount:</h5></div>
                            <div class="col-6 text-end"><h5>${formatCurrency(transaction.total_amount)}</h5></div>
                        </div>
                    </div>
                `;

                document.getElementById('transactionDetails').innerHTML = detailsHtml;
                new bootstrap.Modal(document.getElementById('transactionModal')).show();
            } catch (error) {
                console.error('Error loading transaction details:', error);
                showToast('Failed to load transaction details', 'danger');
            }
        }

        function clearFilters() {
            document.getElementById('filterType').value = '';
            document.getElementById('filterDate').value = '';
            loadTransactions();
        }

        // Load transactions on page load
        loadTransactions();
    </script>
</body>
</html>
